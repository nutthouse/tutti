[workspace]
name = "tutti"
description = "Codex-driven SDLC automation"

[defaults]
runtime = "codex"
worktree = true

# Specialized agents: each owns one part of the SDLC.

[[agent]]
name = "conductor"
runtime = "codex"
worktree = true
persistent = true
prompt = "You orchestrate workflow state and handoffs only. You do not implement features directly."

[[agent]]
name = "implementer"
runtime = "codex"
worktree = true
persistent = true
scope = "src/**"
prompt = "Implement feature/code changes for the selected issue. Keep changes minimal and aligned to issue scope."

[[agent]]
name = "tester"
runtime = "codex"
worktree = true
persistent = true
scope = "tests/**"
prompt = "Own test strategy and test updates. Ensure failing tests are fixed and coverage reflects behavior changes."

[[agent]]
name = "docs-release"
runtime = "codex"
worktree = true
persistent = true
scope = "docs/**"
prompt = "Own docs, changelog, and version bump policy. Update README/docs/CHANGELOG and Cargo.toml when required."

[[agent]]
name = "reviewer"
runtime = "codex"
worktree = true
persistent = false
prompt = "Perform strict review and release-readiness validation. Block if risk is unresolved."

[[workflow]]
name = "sdlc-smoke"
description = "Preflight test run before unattended automation"

[[workflow.step]]
id = "select_issue"
type = "command"
run = "scripts/automation/select_issue.sh .tutti/state/auto/selected_issue.json agent-ops"
fail_mode = "closed"

[[workflow.step]]
id = "create_branch"
type = "command"
run = "scripts/automation/create_issue_branch.sh .tutti/state/auto/selected_issue.json .tutti/state/auto/branch.json"
fail_mode = "closed"

[[workflow.step]]
id = "validate_smoke"
type = "command"
run = "cargo test --quiet"
fail_mode = "closed"

[[workflow]]
name = "sdlc-auto"
description = "Full issue -> branch -> code -> test -> docs/version -> PR -> CodeRabbit -> fix loop"

# 1) Ensure all specialized agents are running
[[workflow.step]]
id = "ensure_conductor"
type = "ensure_running"
agent = "conductor"

[[workflow.step]]
id = "ensure_implementer"
type = "ensure_running"
agent = "implementer"

[[workflow.step]]
id = "ensure_tester"
type = "ensure_running"
agent = "tester"

[[workflow.step]]
id = "ensure_docs_release"
type = "ensure_running"
agent = "docs-release"

# 2) Intake and branch setup
[[workflow.step]]
id = "select_issue"
type = "command"
run = "scripts/automation/select_issue.sh .tutti/state/auto/selected_issue.json agent-ops"
fail_mode = "closed"

[[workflow.step]]
id = "create_branch"
type = "command"
run = "scripts/automation/create_issue_branch.sh .tutti/state/auto/selected_issue.json .tutti/state/auto/branch.json"
fail_mode = "closed"

# 3) Implementation specialization
[[workflow.step]]
id = "implement_code"
type = "prompt"
agent = "implementer"
inject_files = [".tutti/state/auto/selected_issue.json", ".tutti/state/auto/branch.json"]
wait_for_idle = true
wait_timeout_secs = 3600
text = "Implement the selected issue in src/. Keep scope tight. Commit code changes when done."

[[workflow.step]]
id = "test_update_and_validate"
type = "prompt"
agent = "tester"
inject_files = [".tutti/state/auto/selected_issue.json", ".tutti/state/auto/branch.json"]
wait_for_idle = true
wait_timeout_secs = 2400
text = "Update/add tests for the implemented behavior and run test suite. Fix test failures. Commit test changes."

[[workflow.step]]
id = "docs_and_version"
type = "prompt"
agent = "docs-release"
inject_files = [".tutti/state/auto/selected_issue.json", ".tutti/state/auto/branch.json"]
wait_for_idle = true
wait_timeout_secs = 1800
text = "Update docs and changelog. If behavior changed, increment version in Cargo.toml and note release impact. Commit docs/release changes."

# 4) Hard validation gate
[[workflow.step]]
id = "validate"
type = "command"
run = "cargo test --quiet"
fail_mode = "closed"

# 5) Open PR
[[workflow.step]]
id = "open_pr"
type = "command"
run = "python3 - <<'PY'\nimport json,subprocess\ni=json.load(open('.tutti/state/auto/selected_issue.json'))\nb=json.load(open('.tutti/state/auto/branch.json'))\nbranch=b['branch']\nissue=i['issue_number']\ntitle=f\"[auto] #{issue} {i['title']}\"\nbody=f\"Automated SDLC cycle for #{issue}.\\n\\n- implementation: completed\\n- tests: updated\\n- docs/changelog: updated\\n- version: bumped if required\"\nsubprocess.check_call(['gh','pr','create','--title',title,'--body',body,'--head',branch,'--base','main'])\nPY"
fail_mode = "closed"

# 6) Review loop
[[workflow.step]]
id = "wait_coderabbit"
type = "command"
run = "python3 - <<'PY'\nimport subprocess,json\nbranch=json.load(open('.tutti/state/auto/branch.json'))['branch']\nout=subprocess.check_output(['gh','pr','list','--state','open','--head',branch,'--json','number'], text=True)\npr=json.loads(out)[0]['number']\nsubprocess.check_call(['scripts/automation/wait_coderabbit.sh',str(pr),'45','.tutti/state/auto/coderabbit_status.json'])\nsubprocess.check_call(['scripts/automation/collect_coderabbit_feedback.sh',str(pr),'.tutti/state/auto/coderabbit-feedback.md'])\nPY"
fail_mode = "open"

[[workflow.step]]
id = "apply_coderabbit_feedback"
type = "prompt"
agent = "implementer"
inject_files = [".tutti/state/auto/coderabbit-feedback.md", ".tutti/state/auto/branch.json"]
wait_for_idle = true
wait_timeout_secs = 2400
text = "Apply CodeRabbit feedback if actionable, rerun tests, and push changes. If no actionable items, state that explicitly."

[[workflow.step]]
id = "revalidate"
type = "command"
run = "cargo test --quiet"
fail_mode = "closed"

# 7) Human-like final review gate (automated reviewer agent)
[[workflow.step]]
id = "final_review"
type = "review"
agent = "implementer"
reviewer = "reviewer"

[[workflow.step]]
id = "ready_summary"
type = "prompt"
agent = "conductor"
inject_files = [".tutti/state/auto/selected_issue.json", ".tutti/state/auto/branch.json", ".tutti/state/auto/coderabbit-feedback.md"]
wait_for_idle = true
wait_timeout_secs = 900
text = "Summarize final readiness, residual risks, and merge recommendation."
