<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>tutti dashboard — unit tests</title>
  <style>
    body { font-family: monospace; background: #0a0f1e; color: #f9fafb; padding: 24px; }
    .pass { color: #22c55e; }
    .fail { color: #ef4444; }
    .suite { margin-bottom: 16px; }
    .suite-name { font-weight: bold; margin-bottom: 4px; }
    .result { padding-left: 16px; font-size: 13px; }
    #summary { margin-top: 24px; font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>
<h1>tutti dashboard tests</h1>
<div id="output"></div>
<div id="summary"></div>

<script>
// ── Test harness ──
var passed = 0, failed = 0;
var $output = document.getElementById("output");
var currentSuite = null;
var suiteEl = null;

function suite(name) {
  currentSuite = name;
  suiteEl = document.createElement("div");
  suiteEl.className = "suite";
  var title = document.createElement("div");
  title.className = "suite-name";
  title.textContent = name;
  suiteEl.appendChild(title);
  $output.appendChild(suiteEl);
}

function assert(description, actual, expected) {
  var ok = actual === expected;
  var line = document.createElement("div");
  line.className = "result " + (ok ? "pass" : "fail");
  if (ok) {
    line.textContent = "\u2713 " + description;
    passed++;
  } else {
    line.textContent = "\u2717 " + description + " — expected " + JSON.stringify(expected) + ", got " + JSON.stringify(actual);
    failed++;
  }
  suiteEl.appendChild(line);
}

function assertTruthy(description, actual) {
  var ok = !!actual;
  var line = document.createElement("div");
  line.className = "result " + (ok ? "pass" : "fail");
  if (ok) {
    line.textContent = "\u2713 " + description;
    passed++;
  } else {
    line.textContent = "\u2717 " + description + " — got " + JSON.stringify(actual);
    failed++;
  }
  suiteEl.appendChild(line);
}

function assertNull(description, actual) {
  var ok = actual === null || actual === undefined;
  var line = document.createElement("div");
  line.className = "result " + (ok ? "pass" : "fail");
  if (ok) {
    line.textContent = "\u2713 " + description;
    passed++;
  } else {
    line.textContent = "\u2717 " + description + " — expected null, got " + JSON.stringify(actual);
    failed++;
  }
  suiteEl.appendChild(line);
}

// ── Functions under test (copied from app.js to keep tests self-contained) ──

var STAGE_ORDER = ["planner", "implementer", "tester", "reviewer", "docs-release"];

function stageFor(agent) {
  var a = agent.toLowerCase();
  for (var i = 0; i < STAGE_ORDER.length; i++) {
    var s = STAGE_ORDER[i];
    if (a.indexOf(s.replace("-", "")) !== -1 || a.indexOf(s) !== -1) return s;
  }
  return null;
}

function stateClass(agent) {
  if (!agent.running) return "stopped";
  if (agent.auth_state === "expired" || agent.auth_state === "failed")
    return "auth-fail";
  if (agent.activity_state === "blocked" || agent.activity_state === "rate_limited")
    return "blocked";
  if (agent.activity_state === "working" || agent.activity_state === "active")
    return "working";
  return "idle";
}

function timeAgo(ts) {
  if (!ts) return "\u2014";
  var diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 0) return "just now";
  if (diff < 60) return Math.floor(diff) + "s ago";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  return Math.floor(diff / 3600) + "h ago";
}

function agentKey(workspace, agent) {
  return (workspace || "_") + ":" + agent;
}

function findBottleneck(agents) {
  var longest = null;
  var longestDuration = 0;
  var now = Date.now();
  var names = Object.keys(agents);
  for (var i = 0; i < names.length; i++) {
    var agent = agents[names[i]];
    if (stateClass(agent) !== "working") continue;
    var ts = agent.last_output_change_at;
    if (!ts) continue;
    var duration = now - new Date(ts).getTime();
    if (duration > longestDuration) {
      longestDuration = duration;
      longest = agent;
    }
  }
  return longest;
}

// ── Tests ──

suite("stageFor");
assert("planner maps to planner", stageFor("planner"), "planner");
assert("implementer maps to implementer", stageFor("implementer"), "implementer");
assert("tester maps to tester", stageFor("tester"), "tester");
assert("reviewer maps to reviewer", stageFor("reviewer"), "reviewer");
assert("docs-release maps to docs-release", stageFor("docs-release"), "docs-release");
assert("docsrelease (no hyphen) maps to docs-release", stageFor("docsrelease"), "docs-release");
assert("unknown agent returns null", stageFor("conductor"), null);
assert("case insensitive", stageFor("PLANNER"), "planner");
assert("prefix match works", stageFor("my-planner-agent"), "planner");

suite("stateClass");
assert("not running = stopped", stateClass({ running: false }), "stopped");
assert("auth expired = auth-fail", stateClass({ running: true, auth_state: "expired" }), "auth-fail");
assert("auth failed = auth-fail", stateClass({ running: true, auth_state: "failed" }), "auth-fail");
assert("blocked activity = blocked", stateClass({ running: true, auth_state: "ok", activity_state: "blocked" }), "blocked");
assert("rate limited = blocked", stateClass({ running: true, auth_state: "ok", activity_state: "rate_limited" }), "blocked");
assert("working = working", stateClass({ running: true, auth_state: "ok", activity_state: "working" }), "working");
assert("active = working", stateClass({ running: true, auth_state: "ok", activity_state: "active" }), "working");
assert("idle default", stateClass({ running: true, auth_state: "ok", activity_state: "idle" }), "idle");
assert("unknown activity = idle", stateClass({ running: true, auth_state: "ok", activity_state: "something_else" }), "idle");

suite("stateClass priority");
assert("auth-fail takes precedence over blocked", stateClass({ running: true, auth_state: "failed", activity_state: "blocked" }), "auth-fail");
assert("stopped takes precedence over everything", stateClass({ running: false, auth_state: "failed", activity_state: "working" }), "stopped");

suite("timeAgo");
assert("null returns dash", timeAgo(null), "\u2014");
assert("undefined returns dash", timeAgo(undefined), "\u2014");
var now = new Date().toISOString();
assert("just now returns seconds", timeAgo(now).indexOf("s ago") !== -1 || timeAgo(now) === "0s ago", true);
var fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
assert("5 min ago", timeAgo(fiveMinAgo), "5m ago");
var twoHoursAgo = new Date(Date.now() - 2 * 3600 * 1000).toISOString();
assert("2 hours ago", timeAgo(twoHoursAgo), "2h ago");
var futureTs = new Date(Date.now() + 60000).toISOString();
assert("future timestamp = just now", timeAgo(futureTs), "just now");

suite("agentKey");
assert("normal key", agentKey("myws", "planner"), "myws:planner");
assert("null workspace uses underscore", agentKey(null, "planner"), "_:planner");
assert("undefined workspace uses underscore", agentKey(undefined, "planner"), "_:planner");

suite("findBottleneck");
assertNull("empty agents = null", findBottleneck({}));
assertNull("no working agents = null", findBottleneck({
  "a:planner": { running: true, auth_state: "ok", activity_state: "idle", agent: "planner" }
}));
assertNull("working but null timestamp = null", findBottleneck({
  "a:planner": { running: true, auth_state: "ok", activity_state: "working", agent: "planner", last_output_change_at: null }
}));

var oldTs = new Date(Date.now() - 600000).toISOString();
var recentTs = new Date(Date.now() - 60000).toISOString();
var bottleneckResult = findBottleneck({
  "a:planner": { running: true, auth_state: "ok", activity_state: "working", agent: "planner", last_output_change_at: oldTs },
  "a:implementer": { running: true, auth_state: "ok", activity_state: "working", agent: "implementer", last_output_change_at: recentTs }
});
assert("longest working agent is bottleneck", bottleneckResult.agent, "planner");

var tieResult = findBottleneck({
  "a:planner": { running: true, auth_state: "ok", activity_state: "working", agent: "planner", last_output_change_at: oldTs },
  "a:implementer": { running: true, auth_state: "ok", activity_state: "idle", agent: "implementer", last_output_change_at: oldTs }
});
assert("idle agents ignored even with old timestamp", tieResult.agent, "planner");

var singleResult = findBottleneck({
  "a:reviewer": { running: true, auth_state: "ok", activity_state: "working", agent: "reviewer", last_output_change_at: recentTs }
});
assert("single working agent is bottleneck", singleResult.agent, "reviewer");

// ── Run tracking functions under test ──
function runStageFromEvent(evt) {
  if (!evt || !evt.data) return null;
  var agent = evt.agent || (evt.data && evt.data.agent);
  if (agent) return stageFor(agent);
  return null;
}

function formatDuration(ms) {
  if (!ms && ms !== 0) return "\u2014";
  if (ms < 1000) return ms + "ms";
  var s = Math.floor(ms / 1000);
  if (s < 60) return s + "s";
  var m = Math.floor(s / 60);
  s = s % 60;
  return m + "m " + s + "s";
}

function processWorkflowEvent(evt) {
  var id = evt.correlation_id;
  if (!id) return;
  if (evt.event === "workflow.started") {
    testRuns[id] = {
      id: id, status: "running", stage: null, stepIndex: 0,
      totalSteps: (evt.data && evt.data.total_steps) || 0,
      workflowName: (evt.data && evt.data.workflow_name) || "",
      startedAt: evt.timestamp,
      steps: []
    };
    return;
  }
  var run = testRuns[id];
  if (!run) return;
  if (evt.event === "workflow.step.started") {
    run.stage = runStageFromEvent(evt);
    run.stepIndex = (evt.data && evt.data.step_index) || run.stepIndex;
    run.totalSteps = (evt.data && evt.data.total_steps) || run.totalSteps;
    run.status = "running";
    var idx = evt.data && evt.data.step_index;
    if (idx) {
      run.steps[idx] = {
        index: idx, type: (evt.data && evt.data.step_type) || "unknown",
        agent: evt.agent || null, stage: run.stage,
        status: "running", startedAt: evt.timestamp,
        durationMs: null, message: null
      };
    }
  } else if (evt.event === "workflow.step.completed") {
    var cidx = evt.data && evt.data.step_index;
    if (cidx && run.steps[cidx]) {
      run.steps[cidx].status = "completed";
      run.steps[cidx].durationMs = (evt.data && evt.data.duration_ms) || null;
    }
  } else if (evt.event === "workflow.step.failed") {
    run.stage = runStageFromEvent(evt);
    run.status = "failed";
    var fidx = evt.data && evt.data.step_index;
    if (fidx && run.steps[fidx]) {
      run.steps[fidx].status = "failed";
      run.steps[fidx].durationMs = (evt.data && evt.data.duration_ms) || null;
      run.steps[fidx].message = (evt.data && evt.data.message) || null;
    }
  } else if (evt.event === "workflow.completed") {
    run.status = "completed";
    run.finishedAt = evt.timestamp;
  } else if (evt.event === "workflow.failed") {
    run.status = "failed";
    run.finishedAt = evt.timestamp;
  }
}

function runsAtStage(stage) {
  var result = [];
  var ids = Object.keys(testRuns);
  for (var i = 0; i < ids.length; i++) {
    var run = testRuns[ids[i]];
    if (run.stage === stage && run.status !== "completed" && run.status !== "failed") result.push(run);
  }
  return result;
}

var testRuns = {};

suite("runStageFromEvent");
assert("null event returns null", runStageFromEvent(null), null);
assert("event without data returns null", runStageFromEvent({ event: "test" }), null);
assert("event with agent maps to stage", runStageFromEvent({ agent: "planner", data: {} }), "planner");
assert("event with data.agent maps to stage", runStageFromEvent({ data: { agent: "implementer" } }), "implementer");
assertNull("unknown agent returns null", runStageFromEvent({ agent: "conductor", data: {} }));

suite("processWorkflowEvent — workflow lifecycle");
testRuns = {};
processWorkflowEvent({
  event: "workflow.started", correlation_id: "run-1",
  data: { workflow_name: "sdlc", total_steps: 5 },
  timestamp: new Date().toISOString()
});
assertTruthy("workflow.started creates run", testRuns["run-1"]);
assert("run status is running", testRuns["run-1"].status, "running");
assert("run totalSteps is 5", testRuns["run-1"].totalSteps, 5);
assert("run workflowName is sdlc", testRuns["run-1"].workflowName, "sdlc");

processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "run-1",
  agent: "planner", data: { step_index: 1, total_steps: 5 }
});
assert("step.started sets stage to planner", testRuns["run-1"].stage, "planner");
assert("step.started sets stepIndex", testRuns["run-1"].stepIndex, 1);

processWorkflowEvent({
  event: "workflow.step.completed", correlation_id: "run-1",
  agent: "planner", data: { step_index: 1 }
});
assert("step.completed keeps status running", testRuns["run-1"].status, "running");

processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "run-1",
  agent: "implementer", data: { step_index: 2, total_steps: 5 }
});
assert("second step moves stage to implementer", testRuns["run-1"].stage, "implementer");

processWorkflowEvent({
  event: "workflow.completed", correlation_id: "run-1",
  data: { success: true }
});
assert("workflow.completed sets status completed", testRuns["run-1"].status, "completed");

suite("processWorkflowEvent — failure");
testRuns = {};
processWorkflowEvent({
  event: "workflow.started", correlation_id: "run-2",
  data: { workflow_name: "test-wf", total_steps: 3 },
  timestamp: new Date().toISOString()
});
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "run-2",
  agent: "tester", data: { step_index: 1, total_steps: 3 }
});
processWorkflowEvent({
  event: "workflow.step.failed", correlation_id: "run-2",
  agent: "tester", data: { step_index: 1, message: "timed out" }
});
assert("step.failed sets status to failed", testRuns["run-2"].status, "failed");
assert("step.failed keeps stage at tester", testRuns["run-2"].stage, "tester");

suite("processWorkflowEvent — ignores unknown runs");
testRuns = {};
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "unknown-run",
  agent: "planner", data: { step_index: 1 }
});
assertNull("no run created for unknown correlation_id", testRuns["unknown-run"]);

suite("runsAtStage");
testRuns = {};
processWorkflowEvent({
  event: "workflow.started", correlation_id: "r1",
  data: { workflow_name: "a", total_steps: 2 },
  timestamp: new Date().toISOString()
});
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "r1",
  agent: "planner", data: { step_index: 1 }
});
processWorkflowEvent({
  event: "workflow.started", correlation_id: "r2",
  data: { workflow_name: "b", total_steps: 2 },
  timestamp: new Date().toISOString()
});
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "r2",
  agent: "planner", data: { step_index: 1 }
});
assert("two runs at planner stage", runsAtStage("planner").length, 2);
assert("zero runs at implementer stage", runsAtStage("implementer").length, 0);
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "r1",
  agent: "implementer", data: { step_index: 2 }
});
assert("one run moved to implementer", runsAtStage("implementer").length, 1);
assert("one run still at planner", runsAtStage("planner").length, 1);

suite("processWorkflowEvent — no correlation_id");
testRuns = {};
var prevKeys = Object.keys(testRuns).length;
processWorkflowEvent({ event: "workflow.started", data: {} });
assert("no run created without correlation_id", Object.keys(testRuns).length, prevKeys);

suite("formatDuration");
assert("null returns dash", formatDuration(null), "\u2014");
assert("undefined returns dash", formatDuration(undefined), "\u2014");
assert("0ms", formatDuration(0), "0ms");
assert("500ms", formatDuration(500), "500ms");
assert("999ms", formatDuration(999), "999ms");
assert("1000ms = 1s", formatDuration(1000), "1s");
assert("5500ms = 5s", formatDuration(5500), "5s");
assert("61000ms = 1m 1s", formatDuration(61000), "1m 1s");
assert("120000ms = 2m 0s", formatDuration(120000), "2m 0s");

suite("step timeline tracking");
testRuns = {};
processWorkflowEvent({
  event: "workflow.started", correlation_id: "st-1",
  data: { workflow_name: "sdlc", total_steps: 3 },
  timestamp: "2026-03-21T05:00:00Z"
});
assertTruthy("run has steps array", Array.isArray(testRuns["st-1"].steps));
assert("steps array starts empty", testRuns["st-1"].steps.length, 0);

processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "st-1",
  agent: "planner", data: { step_index: 1, step_type: "prompt", total_steps: 3 },
  timestamp: "2026-03-21T05:00:01Z"
});
assertTruthy("step 1 recorded", testRuns["st-1"].steps[1]);
assert("step 1 type is prompt", testRuns["st-1"].steps[1].type, "prompt");
assert("step 1 agent is planner", testRuns["st-1"].steps[1].agent, "planner");
assert("step 1 status is running", testRuns["st-1"].steps[1].status, "running");
assertNull("step 1 duration is null while running", testRuns["st-1"].steps[1].durationMs);

processWorkflowEvent({
  event: "workflow.step.completed", correlation_id: "st-1",
  agent: "planner", data: { step_index: 1, duration_ms: 82000 }
});
assert("step 1 status is completed", testRuns["st-1"].steps[1].status, "completed");
assert("step 1 duration is 82000", testRuns["st-1"].steps[1].durationMs, 82000);

processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "st-1",
  agent: "implementer", data: { step_index: 2, step_type: "prompt", total_steps: 3 },
  timestamp: "2026-03-21T05:01:23Z"
});
processWorkflowEvent({
  event: "workflow.step.failed", correlation_id: "st-1",
  agent: "implementer", data: { step_index: 2, duration_ms: 43000, message: "no commit produced" }
});
assert("step 2 status is failed", testRuns["st-1"].steps[2].status, "failed");
assert("step 2 duration recorded", testRuns["st-1"].steps[2].durationMs, 43000);
assert("step 2 failure message", testRuns["st-1"].steps[2].message, "no commit produced");

suite("runsAtStage — excludes terminal runs");
testRuns = {};
processWorkflowEvent({
  event: "workflow.started", correlation_id: "term-1",
  data: { workflow_name: "a", total_steps: 2 },
  timestamp: new Date().toISOString()
});
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "term-1",
  agent: "planner", data: { step_index: 1 }
});
assert("running run shows at planner", runsAtStage("planner").length, 1);
processWorkflowEvent({
  event: "workflow.completed", correlation_id: "term-1",
  data: { success: true }
});
assert("completed run excluded from stage", runsAtStage("planner").length, 0);

testRuns = {};
processWorkflowEvent({
  event: "workflow.started", correlation_id: "term-2",
  data: { workflow_name: "b", total_steps: 2 },
  timestamp: new Date().toISOString()
});
processWorkflowEvent({
  event: "workflow.step.started", correlation_id: "term-2",
  agent: "tester", data: { step_index: 1 }
});
processWorkflowEvent({
  event: "workflow.failed", correlation_id: "term-2",
  data: { success: false }
});
assert("failed run excluded from stage", runsAtStage("tester").length, 0);

// ── Focus mode helpers under test ──

function formatTokens(n) {
  if (!n) return "0";
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return String(n);
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

suite("formatTokens");
assert("0 tokens", formatTokens(0), "0");
assert("500 tokens", formatTokens(500), "500");
assert("1500 tokens = 1.5K", formatTokens(1500), "1.5K");
assert("142847 tokens = 142.8K", formatTokens(142847), "142.8K");
assert("1500000 tokens = 1.5M", formatTokens(1500000), "1.5M");

suite("escapeHtml");
assert("escapes angle brackets", escapeHtml("<div>"), "&lt;div&gt;");
assert("escapes ampersand", escapeHtml("a & b"), "a &amp; b");
assert("plain text unchanged", escapeHtml("hello"), "hello");

suite("focus view state");
// Simulate the view state machine
var testAppState = { view: "factory", focusAgent: null };

// Enter focus
testAppState.view = "focus";
testAppState.focusAgent = { workspace: "tutti", agent: "implementer" };
assert("focus mode sets view", testAppState.view, "focus");
assert("focusAgent has workspace", testAppState.focusAgent.workspace, "tutti");
assert("focusAgent has agent", testAppState.focusAgent.agent, "implementer");

// Exit focus
testAppState.view = "factory";
testAppState.focusAgent = null;
assert("exit restores factory view", testAppState.view, "factory");
assertNull("exit clears focusAgent", testAppState.focusAgent);

suite("stale response guard");
// Simulate: start polling agent A, then switch to agent B
var guardAgent = { workspace: "tutti", agent: "planner" };
var responseAgent = { workspace: "tutti", agent: "planner" };
assert("matching agent = accept", guardAgent.agent === responseAgent.agent, true);
responseAgent = { workspace: "tutti", agent: "implementer" };
assert("different agent = reject", guardAgent.agent === responseAgent.agent, false);

// ── Summary ──
var $summary = document.getElementById("summary");
$summary.className = failed > 0 ? "fail" : "pass";
$summary.textContent = passed + " passed, " + failed + " failed";
</script>
</body>
</html>
