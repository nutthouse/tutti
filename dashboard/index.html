<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tutti — factory floor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="top-bar">
    <div class="bar-left">
      <span class="logo">tutti</span>
      <span id="workspace-name" class="dim">—</span>
    </div>
    <div class="bar-right">
      <span class="hud-item" id="hud-active" title="working agents">0 active</span>
      <span class="hud-item" id="hud-blocked" title="blocked or auth-failed agents">0 blocked</span>
      <span class="hud-item" id="hud-runs" title="active workflow runs"></span>
      <span class="hud-item" id="hud-bottleneck" title="longest-working agent"></span>
      <span class="conn-dot" id="conn-status" title="SSE connection"></span>
    </div>
  </header>

  <main id="factory">
    <div class="pipeline" id="pipeline">
      <!-- stages injected by app.js -->
    </div>
  </main>

  <div id="detail-drawer">
    <div class="detail-header">
      <span class="detail-agent-name" id="detail-name">—</span>
      <button class="detail-close" id="detail-close">close</button>
    </div>
    <div class="detail-meta" id="detail-meta"></div>
    <ul class="detail-events" id="detail-events"></ul>
  </div>

  <div id="dispatch-panel">
    <button class="dispatch-toggle" id="dispatch-toggle" title="dispatch a workflow run">+ run</button>
    <div class="dispatch-form" id="dispatch-form">
      <select id="dispatch-workflow"><option value="">loading…</option></select>
      <input id="dispatch-issue" type="text" placeholder="issue # (optional)" />
      <button id="dispatch-go">dispatch</button>
      <span id="dispatch-status" class="dispatch-status"></span>
    </div>
  </div>

  <!-- Agent Focus Mode (full-screen takeover) -->
  <div id="focus-view" role="main" style="display:none">
    <div class="focus-bar">
      <button class="focus-back" id="focus-back" role="button" aria-label="Return to factory floor">&larr; factory floor</button>
      <span class="focus-agent-name" id="focus-agent-name">—</span>
      <span class="focus-status" id="focus-status"></span>
      <span class="focus-meta" id="focus-meta"></span>
    </div>
    <div class="focus-grid">
      <div class="focus-terminal" id="focus-terminal" role="log" aria-live="polite"></div>
      <div class="focus-sidebar">
        <div class="focus-section">
          <h3>usage</h3>
          <div class="focus-stats" id="focus-stats"></div>
        </div>
        <div class="focus-section">
          <h3>changes</h3>
          <div class="focus-diff" id="focus-diff"></div>
        </div>
        <div class="focus-section">
          <h3>progress</h3>
          <div class="focus-progress" id="focus-progress"></div>
        </div>
      </div>
    </div>
    <div class="focus-prompt-bar">
      <input type="text" id="focus-prompt-input" placeholder="Send a prompt to this agent..." aria-label="Send prompt to agent" />
      <button class="focus-send" id="focus-send" aria-label="Send">send</button>
    </div>
  </div>

  <footer id="timeline">
    <h3>recent events</h3>
    <ul id="event-list"></ul>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
